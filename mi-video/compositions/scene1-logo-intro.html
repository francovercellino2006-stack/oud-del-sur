<template id="scene1-logo-intro-template">
  <div
    data-composition-id="scene1-logo-intro"
    data-width="1920"
    data-height="1080"
    data-duration="1.5"
  >
    <div class="canvas">
      <div class="brand-wrap">
        <div class="word-oud">OUD</div>
        <div class="divider-line"></div>
        <div class="word-del-sur">DEL SUR</div>
      </div>
    </div>

    <style>
      [data-composition-id="scene1-logo-intro"] .canvas {
        width: 1920px;
        height: 1080px;
        background: #080808;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      [data-composition-id="scene1-logo-intro"] .brand-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      [data-composition-id="scene1-logo-intro"] .word-oud {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 210px;
        font-weight: 300;
        color: #D4AF37;
        letter-spacing: 0.45em;
        padding-right: 0.45em;
        line-height: 1;
      }
      [data-composition-id="scene1-logo-intro"] .divider-line {
        height: 1px;
        width: 540px;
        background: linear-gradient(90deg, transparent 0%, #D4AF37 25%, #D4AF37 75%, transparent 100%);
        margin: 14px 0;
      }
      [data-composition-id="scene1-logo-intro"] .word-del-sur {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 72px;
        font-weight: 300;
        color: rgba(212, 175, 55, 0.7);
        letter-spacing: 0.75em;
        padding-right: 0.75em;
        line-height: 1;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const s = '[data-composition-id="scene1-logo-intro"]';
        const tl = gsap.timeline({ paused: true });

        gsap.set(`${s} .word-oud`, { opacity: 0, x: -70 });
        gsap.set(`${s} .word-del-sur`, { opacity: 0, x: 70 });
        gsap.set(`${s} .divider-line`, { scaleX: 0, transformOrigin: 'center center' });

        tl.to(`${s} .word-oud`, { opacity: 1, x: 0, duration: 0.65, ease: 'power3.out' }, 0);
        tl.to(`${s} .word-del-sur`, { opacity: 1, x: 0, duration: 0.65, ease: 'power3.out' }, 0.08);
        tl.to(`${s} .divider-line`, { scaleX: 1, duration: 0.55, ease: 'power2.out' }, 0.3);

        window.__timelines = window.__timelines || {};
        window.__timelines['scene1-logo-intro'] = tl;
      })();
    </script>
  </div>
</template>
